name: ci

on:
  pull_request:
    branches: [master, main]
  merge_group:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --include=dev

      - name: Lint (syntax)
        run: npm run lint

      - name: Run tests
        run: npm test
